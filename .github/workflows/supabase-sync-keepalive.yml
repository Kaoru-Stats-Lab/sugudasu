# Reset Supabase Free-tier 7-day inactivity timer for Sync project.
# SSOT: docs/notes/SUPABASE_SYNC_KEEPALIVE.md
name: Supabase Sync Keepalive

on:
  schedule:
    # Daily 03:00 UTC — wider safety margin for Free tier pause window
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase REST
        env:
          SYNC_SUPABASE_URL: ${{ secrets.SYNC_SUPABASE_URL }}
          SYNC_SUPABASE_ANON_KEY: ${{ secrets.SYNC_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SYNC_SUPABASE_URL:-}" ] || [ -z "${SYNC_SUPABASE_ANON_KEY:-}" ]; then
            echo "[keepalive] SKIP: GitHub Secrets not configured (SYNC_SUPABASE_URL / SYNC_SUPABASE_ANON_KEY)"
            exit 0
          fi
          URL="${SYNC_SUPABASE_URL%/}/rest/v1/"
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SYNC_SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SYNC_SUPABASE_ANON_KEY}" \
            "$URL")
          echo "[keepalive] GET $URL → HTTP $CODE"
          case "$CODE" in
            200|401|404) echo "[keepalive] OK" ;;
            *) echo "[keepalive] FAIL unexpected status"; exit 1 ;;
          esac
