<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="請求書・ラベル・議事録など8つの無料ツール。ブラウザだけで完結、登録不要。">
    <title>すぐだす SUGUDASU — 無料ビジネスツール8選</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../assets/sugudasu.css">
</head>
<body class="sg-body min-h-screen flex flex-col antialiased">
<div id="sg-chrome-top"></div>

<main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 space-y-8">
    <section class="text-center space-y-3">
        <h2 class="text-xl font-bold text-slate-900">ブラウザだけで完結。登録不要。</h2>
        <p class="text-sm text-slate-600 max-w-xl mx-auto">入力データは外部に送信しません。フリーランス・店舗・オフィス・フリマの「すぐ終わる」作業を8つのツールで。</p>
        <p class="text-[11px] text-emerald-700 bg-emerald-50 border border-emerald-200 inline-block px-3 py-1 rounded-full">完全ローカル処理</p>
    </section>

    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <a href="index.html" class="sg-card block p-5 hover:border-blue-300 transition-colors ring-1 ring-blue-100">
            <p class="text-xs font-bold text-blue-600 mb-1">実務で人気</p>
            <h3 class="font-bold text-slate-900">見積・納品・請求書</h3>
            <p class="text-xs text-slate-500 mt-2">インボイス対応・PDF印刷</p>
        </a>
        <a href="label.html" class="sg-card block p-5 hover:border-blue-300 transition-colors">
            <h3 class="font-bold text-slate-900">宛名ラベル</h3>
            <p class="text-xs text-slate-500 mt-2">型番検索・一括印刷</p>
        </a>
        <a href="report.html" class="sg-card block p-5 hover:border-blue-300 transition-colors">
            <h3 class="font-bold text-slate-900">議事録・報告書</h3>
            <p class="text-xs text-slate-500 mt-2">メモを整形・コピー</p>
        </a>
        <a href="shift.html" class="sg-card block p-5 hover:border-blue-300 transition-colors">
            <h3 class="font-bold text-slate-900">シフト表</h3>
            <p class="text-xs text-slate-500 mt-2">2ヶ月・公平自動生成</p>
        </a>
        <a href="present.html" class="sg-card block p-5 hover:border-blue-300 transition-colors">
            <h3 class="font-bold text-slate-900">ギフトサジェスター</h3>
            <p class="text-xs text-slate-500 mt-2">地雷回避・Amazon連携</p>
        </a>
        <a href="reverse.html" class="sg-card block p-5 hover:border-blue-300 transition-colors">
            <h3 class="font-bold text-slate-900">逆引き辞典</h3>
            <p class="text-xs text-slate-500 mt-2">言い換え・語彙力</p>
        </a>
        <a href="warikan.html" class="sg-card block p-5 hover:border-blue-300 transition-colors">
            <h3 class="font-bold text-slate-900">傾斜割り勘</h3>
            <p class="text-xs text-slate-500 mt-2">幹事の透明精算</p>
        </a>
        <a href="sns.html" class="sg-card block p-5 hover:border-blue-300 transition-colors">
            <h3 class="font-bold text-slate-900">SNSデコ文字</h3>
            <p class="text-xs text-slate-500 mt-2">縦書き・特殊フォント</p>
        </a>
    </section>

    <aside class="no-print ad-slot ad-slot--result max-w-2xl mx-auto">広告枠</aside>
</main>

<div id="sg-chrome-bottom"></div>
<script src="../assets/sugudasu-shell.js"></script>
<script>SUGUDASU_SHELL.mount({ title: 'ツール一覧', print: false });</script>
</body>
</html>
